<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Homer Cuevas | Portafolio</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #f5f7fa;
      color: #333;
      text-align: center;
    }

    header {
      background-color: #1e293b;
      color: white;
      padding: 40px 20px;
    }

    h1 {
      margin: 0;
      font-size: 2.5rem;
    }

    h2 {
      margin-top: 10px;
      font-weight: normal;
      color: #cbd5f5;
    }

    main {
      padding: 40px 20px;
      display: grid;
      gap: 30px;
      max-width: 900px;
      margin: auto;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      transition: transform 0.2s ease;
    }

    .card:hover {
      transform: scale(1.03);
    }

    .card img {
      width: 100%;
      max-width: 400px;
      border-radius: 8px;
      margin-top: 10px;
    }

    a {
      text-decoration: none;
      color: #2563eb;
      font-weight: bold;
    }

    footer {
      margin-top: 40px;
      padding: 20px;
      background-color: #1e293b;
    }

    footer a {
      color: white;
      margin: 0 10px;
    }
  </style>
</head>

<body>

  <header>
    <h1>Homer Cuevas</h1>
    <h2>Desarrollador Web</h2>
  </header>

  <main>

    <section class="card">
      <h3>
        <a href="./public/movie-ranking.html">🎬 Ranking de Películas</a>
      </h3>
      <img src="./assets/images/Captura de pantalla 2026-04-10 a la(s) 16.42.40.png" alt="Proyecto ranking de películas">
    </section>

    <section class="card">
      <h3>
        <a href="./public/birthday-invite.html">🎉 Invitación de Cumpleaños</a>
      </h3>
      <img src="./assets/images/Captura de pantalla 2026-04-10 a la(s) 16.33.05.png" alt="Proyecto invitación cumpleaños">
    </section>

  </main>

  <footer>
    <a href="./public/about.html">Sobre mí</a>
    <a href="./public/contact.html">Contacto</a>
  </footer>

</body>
</html>
